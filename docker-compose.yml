services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: ScholarVision_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scolaire
      POSTGRES_PASSWORD: scolaire123
      POSTGRES_DB: gestion_scolaire
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scolaire -d gestion_scolaire"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [school-net]

  redis:
    image: redis:7-alpine
    container_name: ScholarVision_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_secret_2024
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret_2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks: [school-net]

  backend:
    build: { context: ./backend, dockerfile: Dockerfile }
    container_name: ScholarVision_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://scolaire:scolaire123@postgres:5432/gestion_scolaire
      REDIS_URL: redis://:redis_secret_2024@redis:6379
      ML_SERVICE_URL: http://ml_service:5001
    volumes: [uploads:/app/uploads]
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    networks: [school-net]

  ml_service:
    build: { context: ./ml_service, dockerfile: Dockerfile }
    container_name: ScholarVision_ml
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://scolaire:scolaire123@postgres:5432/gestion_scolaire
      ML_CONFIDENCE_THRESHOLD: "0.75"
    volumes:
      - ml_models:/app/models
      - uploads:/app/uploads
    depends_on:
      postgres: { condition: service_healthy }
    networks: [school-net]

  frontend:
    build: { context: ./frontend, dockerfile: Dockerfile }
    container_name: ScholarVision_frontend
    restart: unless-stopped
    depends_on: [backend]
    networks: [school-net]

  nginx:
    image: nginx:alpine
    container_name: ScholarVision_nginx
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on: [frontend, backend, ml_service]
    networks: [school-net]

volumes:
  pgdata:
  redisdata:
  uploads:
  ml_models:

networks:
  school-net:
    driver: bridge
    name: school-net
