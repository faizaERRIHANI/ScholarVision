# ════════════════════════════════════════════════════════════
# EduPilot — Orchestration des services
# Réalisé par ERRIHANI Faiza · ENSET Média 2025/2026
# ════════════════════════════════════════════════════════════
# Note : pgvector officiel pour PG18 pas encore disponible.
# On utilise postgres:16 + extension pgvector (image pgvector/pgvector:pg16)
# ════════════════════════════════════════════════════════════

services:

  # ──────────────────────────────────────────────────────────
  # PostgreSQL 16 + extension pgvector pré-installée
  # (compatible avec ta base locale PG18 — schéma identique)
  # ──────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: school_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"        # 5433 pour ne pas entrer en conflit avec la PG18 locale
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - school-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Redis 7 — cache, sessions, refresh tokens
  # ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: school_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - school-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # Backend FastAPI (Python 3.12 dans Docker pour compat libs)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:5001
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - school-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ──────────────────────────────────────────────────────────
  # Frontend React + Vite (dev mode avec HMR)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_ML_URL: http://localhost:5001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - school-net
    command: npm run dev -- --host 0.0.0.0

  # ──────────────────────────────────────────────────────────
  # Service ML — Flask + YOLOv8 + ArcFace (Python 3.12)
  # ──────────────────────────────────────────────────────────
  ml:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: school_ml
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ML_CONFIDENCE_THRESHOLD: ${ML_CONFIDENCE_THRESHOLD}
      BACKEND_URL: http://backend:8000
    ports:
      - "5001:5001"
    volumes:
      - ./ml_service:/app
      - ./uploads:/app/uploads
      - ml_models:/app/ml_models
    devices:
      # - "/dev/video0:/dev/video0"   # Webcam (si VMware partage la caméra)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - school-net
    command: python app.py

  # ──────────────────────────────────────────────────────────
  # Nginx — Reverse Proxy
  # ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: school_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - frontend
      - ml
    networks:
      - school-net

# ────────────────────────────────────────────────────────────
# Volumes persistants
# ────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ml_models:
    driver: local

# ────────────────────────────────────────────────────────────
# Réseau interne isolé
# ────────────────────────────────────────────────────────────
networks:
  school-net:
    driver: bridge
